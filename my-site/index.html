<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar — Runtime UI for AI-generated code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --solar: #f59e0b;
      --solar-dim: #b45309;
      --solar-glow: rgba(245, 158, 11, 0.25);
      --text: #f0ede8;
      --text-dim: #6b6860;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --bg: #09080a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* ── Ambient ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #f59e0b 0%, #92400e 40%, transparent 70%);
      opacity: 0.12;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      width: 100%;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem 6rem;
    }
    .container {
      width: 100%;
      max-width: 960px;
    }

    /* ── Nav ── */
    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6rem;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 50%, #78350f 100%);
      box-shadow: 0 0 12px var(--solar-glow);
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .nav-link {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link--cta {
      color: var(--solar);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .nav-link--cta:hover { background: rgba(245, 158, 11, 0.08); }

    /* ── Badge label ── */
    .label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--solar);
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      max-width: 660px;
      margin: 0 auto 6rem;
    }
    .orbit-ring {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .orbit-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 158, 11, 0.35);
      animation: spin 8s linear infinite;
    }
    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 6px;
      height: 6px;
      margin-left: -3px;
      border-radius: 50%;
      background: var(--solar);
      box-shadow: 0 0 8px var(--solar);
      animation: spin 8s linear infinite;
    }
    .orbit-core {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 55%, #78350f 100%);
      box-shadow: 0 0 20px var(--solar-glow);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #fff8e1 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-dim);
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto;
    }
    .cta-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2.25rem;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:hover { opacity: 0.85; }
    .btn--primary {
      background: var(--solar);
      color: #1a0f00;
      box-shadow: 0 0 20px var(--solar-glow);
    }
    .btn--secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 6rem;
      width: 100%;
    }
    .section__header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .section__title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .section__sub {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Features ── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
    }
    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    .feature-card:hover { border-color: rgba(245, 158, 11, 0.2); }
    .feature-card__icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .feature-card__title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .feature-card__body {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.65;
    }

    /* ── Code block ── */
    .code-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .code-block__bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }
    .code-block__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .code-block__filename {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: ui-monospace, 'Cascadia Code', monospace;
      letter-spacing: 0.02em;
    }
    .code-block__pre {
      padding: 1.75rem;
      overflow-x: auto;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 0.82rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre;
    }

    /* ── Footer ── */
    .site-footer {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .footer-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--text); }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── Built with badge ── */
    .built-badge {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .built-badge:hover {
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--text);
    }
    .built-badge__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 55%, #78350f 100%);
      box-shadow: 0 0 6px var(--solar-glow);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="orb"></div>
  <div id="app"></div>
  <a class="built-badge" href="https://docs.solarbuild.dev/">
    <span class="built-badge__dot"></span>
    Built with Solar
  </a>

  <script>
    const canvas = document.getElementById('stars')
    const ctx = canvas.getContext('2d')
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
    resize()
    window.addEventListener('resize', resize)
    for (let i = 0; i < 160; i++) {
      const x = Math.random() * canvas.width
      const y = Math.random() * canvas.height
      const r = Math.random() * 1.2 + 0.2
      const a = Math.random() * 0.7 + 0.1
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(255,255,255,${a})`
      ctx.fill()
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
