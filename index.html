<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar — Runtime UI for AI-generated code</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Solar — Runtime UI for AI-generated code">
  <meta property="og:description" content="Solar runs directly in the browser. No compiler, no build step. Explicit props, a component registry, and structured errors give agents a predictable contract to work with.">
  <meta property="og:image" content="https://solarbuild.dev/og.png">
  <meta property="og:url" content="https://solarbuild.dev/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Solar — Runtime UI for AI-generated code">
  <meta name="twitter:description" content="Solar runs directly in the browser. No compiler, no build step.">
  <meta name="twitter:image" content="https://solarbuild.dev/og.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --solar: #f59e0b;
      --solar-dim: #b45309;
      --solar-glow: rgba(245, 158, 11, 0.25);
      --text: #f0ede8;
      --text-dim: #6b6860;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --bg: #09080a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* ── Ambient ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #f59e0b 0%, #92400e 40%, transparent 70%);
      opacity: 0.12;
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      width: 100%;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem 6rem;
    }
    .container {
      width: 100%;
      max-width: 960px;
    }

    /* ── Nav ── */
    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6rem;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 50%, #78350f 100%);
      box-shadow: 0 0 12px var(--solar-glow);
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .nav-link {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link--cta {
      color: var(--solar);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .nav-link--cta:hover { background: rgba(245, 158, 11, 0.08); }

    /* ── Badge label ── */
    .label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--solar);
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      max-width: 660px;
      margin: 0 auto 6rem;
    }
    .orbit-ring {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .orbit-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(245, 158, 11, 0.35);
      animation: spin 8s linear infinite;
    }
    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      width: 6px;
      height: 6px;
      margin-left: -3px;
      border-radius: 50%;
      background: var(--solar);
      box-shadow: 0 0 8px var(--solar);
      animation: spin 8s linear infinite;
    }
    .orbit-core {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 55%, #78350f 100%);
      box-shadow: 0 0 20px var(--solar-glow);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #fff8e1 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-dim);
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto;
    }
    .cta-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2.25rem;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:hover { opacity: 0.85; }
    .btn--primary {
      background: var(--solar);
      color: #1a0f00;
      box-shadow: 0 0 20px var(--solar-glow);
    }
    .btn--secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 6rem;
      width: 100%;
    }
    .section__header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .section__title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .section__sub {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.65;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Features ── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
    }
    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    .feature-card:hover { border-color: rgba(245, 158, 11, 0.2); }
    .feature-card__icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .feature-card__title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .feature-card__body {
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.65;
    }

    /* ── Code block ── */
    .code-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .code-block__bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }
    .code-block__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .code-block__filename {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: ui-monospace, 'Cascadia Code', monospace;
      letter-spacing: 0.02em;
    }
    .code-block__pre {
      padding: 1.75rem;
      overflow-x: auto;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 0.82rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre;
    }

    /* ── Footer ── */
    .site-footer {
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .footer-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--text); }
    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── Built with badge ── */
    .built-badge {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .built-badge:hover {
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--text);
    }
    .built-badge__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff8e1 0%, var(--solar) 55%, #78350f 100%);
      box-shadow: 0 0 6px var(--solar-glow);
      flex-shrink: 0;
    }

    /* ── Dot grid ── */
    .dot-grid {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80vh;
      background-image: radial-gradient(circle, rgba(245,158,11,0.14) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating chips ── */
    .float-chip {
      position: fixed;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 0.72rem;
      color: rgba(240,237,232,0.35);
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
      animation: chip-float var(--chip-dur, 7s) ease-in-out var(--chip-delay, 0s) infinite;
      backdrop-filter: blur(4px);
    }
    .float-chip--amber {
      color: rgba(245,158,11,0.5);
      border-color: rgba(245,158,11,0.12);
      background: rgba(245,158,11,0.03);
    }
    @keyframes chip-float {
      0%, 100% { transform: translateY(0) rotate(var(--chip-rotate, 0deg)); opacity: var(--chip-opacity, 0.85); }
      50%       { transform: translateY(-16px) rotate(var(--chip-rotate, 0deg)); opacity: 1; }
    }

    /* ── Prism overrides (scoped to code block) ── */
    .code-block pre[class*="language-"] {
      background: transparent;
      margin: 0;
      padding: 0;
      text-shadow: none;
    }
    .code-block code[class*="language-"] { background: transparent; }
    .code-block .token.keyword      { color: #c084fc; }
    .code-block .token.string       { color: #86efac; }
    .code-block .token.function     { color: #60a5fa; }
    .code-block .token.comment      { color: var(--text-dim); font-style: italic; }
    .code-block .token.number       { color: #fb923c; }
    .code-block .token.boolean      { color: #fb923c; }
    .code-block .token.operator     { color: var(--text-dim); }
    .code-block .token.punctuation  { color: #6b7280; }
    .code-block .token.property     { color: #60a5fa; }
    .code-block .token.parameter    { color: var(--text); }
    .code-block .token.module       { color: var(--solar); }
    .code-block .token.imports      { color: var(--solar); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page { padding: 2rem 1.5rem 5rem; }
      .site-nav { margin-bottom: 4rem; }
      .hero { margin-bottom: 4rem; }
      .section { margin-bottom: 4rem; }
      .section__header { margin-bottom: 2rem; }
    }

    @media (max-width: 1100px) {
      .float-chip { display: none; }
    }

    @media (max-width: 480px) {
      .page { padding: 1.5rem 1.25rem 4rem; }
      .site-nav { margin-bottom: 3rem; }
      .hero { margin-bottom: 3rem; }
      .section { margin-bottom: 3rem; }

      .orbit-ring { width: 60px; height: 60px; }
      .orbit-core { inset: 14px; }

      .hero-sub { font-size: 0.95rem; }

      .features-grid { grid-template-columns: 1fr; }

      .code-block__pre {
        font-size: 0.75rem;
        padding: 1.25rem;
      }
      .code-block__filename { display: none; }

      .built-badge { bottom: 1rem; right: 1rem; }
      .float-chip { display: none; }
    }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="orb"></div>
  <div class="dot-grid"></div>

  <!-- Floating component chips — decorative, hidden below 1100px -->
  <span class="float-chip" style="top:290px;left:5%;--chip-dur:7s;--chip-delay:0s;--chip-rotate:-2deg;">&lt;Nav /&gt;</span>
  <span class="float-chip float-chip--amber" style="top:410px;left:3%;--chip-dur:9s;--chip-delay:1.5s;--chip-rotate:1.5deg;">{ type: 'string' }</span>
  <span class="float-chip" style="top:350px;left:10%;--chip-dur:8s;--chip-delay:3.2s;--chip-rotate:-1deg;">h()</span>
  <span class="float-chip float-chip--amber" style="top:270px;right:4%;--chip-dur:8.5s;--chip-delay:0.6s;--chip-rotate:2deg;">registry.register()</span>
  <span class="float-chip" style="top:420px;right:5%;--chip-dur:7.5s;--chip-delay:2s;--chip-rotate:-1.5deg;">defineComponent()</span>
  <span class="float-chip float-chip--amber" style="top:335px;right:10%;--chip-dur:9.5s;--chip-delay:1s;--chip-rotate:1deg;">&lt;Button /&gt;</span>

  <div id="app"></div>
  <a class="built-badge" href="https://docs.solarbuild.dev/">
    <span class="built-badge__dot"></span>
    Built with Solar
  </a>

  <script>
    const canvas = document.getElementById('stars')
    const ctx = canvas.getContext('2d')
    let W, H
    const stars = []

    function resize() {
      const prevW = W || 0, prevH = H || 0
      W = canvas.width = window.innerWidth
      H = canvas.height = window.innerHeight
      // Rescale star positions proportionally so none fall outside the viewport
      if (prevW > 0 && stars.length) {
        const sx = W / prevW, sy = H / prevH
        for (const s of stars) { s.x *= sx; s.y *= sy }
      }
    }
    resize()
    window.addEventListener('resize', resize)

    for (let i = 0; i < 160; i++) {
      stars.push({
        x:   Math.random() * W,
        y:   Math.random() * H,
        r:   Math.random() * 1.2 + 0.2,
        a:   Math.random() * 0.55 + 0.15,
        vx:  (Math.random() - 0.5) * 0.06,
        vy:  (Math.random() - 0.5) * 0.06,
        ox: 0, oy: 0,
        ovx: 0, ovy: 0,
      })
    }

    const mouse = { x: -9999, y: -9999 }
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY })
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999 })

    ;(function animate() {
      ctx.clearRect(0, 0, W, H)
      for (const s of stars) {
        // Slow ambient drift, wrap edges
        s.x += s.vx; s.y += s.vy
        if (s.x < -10) s.x = W + 10
        if (s.x > W + 10) s.x = -10
        if (s.y < -10) s.y = H + 10
        if (s.y > H + 10) s.y = -10

        // Spring toward cursor within radius
        const dx = mouse.x - (s.x + s.ox)
        const dy = mouse.y - (s.y + s.oy)
        const dist = Math.sqrt(dx * dx + dy * dy)
        if (dist < 200 && dist > 0) {
          const f = ((200 - dist) / 200) * 0.014
          s.ovx += dx * f
          s.ovy += dy * f
        }
        // Spring back to base + dampen
        s.ovx += -s.ox * 0.035
        s.ovy += -s.oy * 0.035
        s.ovx *= 0.80
        s.ovy *= 0.80
        s.ox += s.ovx
        s.oy += s.ovy

        ctx.beginPath()
        ctx.arc(s.x + s.ox, s.y + s.oy, s.r, 0, Math.PI * 2)
        ctx.fillStyle = `rgba(255,255,255,${s.a})`
        ctx.fill()
      }
      requestAnimationFrame(animate)
    })()
  </script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" data-manual></script>
  <script type="module" src="./main.js"></script>
  <script type="module">
    // Solar mounts synchronously, so Prism can highlight immediately after
    if (window.Prism) Prism.highlightAll()
  </script>
</body>
</html>
